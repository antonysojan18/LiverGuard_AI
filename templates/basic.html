<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Analysis - LiverGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #ffe4e8;
            --bg-dark: #5c001e;
            --card-bg: rgba(60, 15, 25, 0.95);
            --border-glass: rgba(255, 182, 193, 0.3);
            --accent: #d03b5b;
            --accent-dim: rgba(208, 59, 91, 0.5);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-main);
            color: #4a0c1a;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .bg-nodes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at top right, #ffffff 0%, transparent 70%);
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            animation: float 12s infinite alternate ease-in-out;
            opacity: 0.4;
            pointer-events: none;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(208, 59, 91, 0.4);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 450px;
            height: 450px;
            background: rgba(255, 182, 193, 0.25);
            bottom: -150px;
            right: -100px;
            animation-duration: 18s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) scale(1);
            }

            100% {
                transform: translateY(40px) scale(1.1);
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2.5rem;
            position: relative;
            z-index: 100;
            background: rgba(60, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 100px;
            max-width: 1100px;
            margin: 2rem auto 2rem;
            transition: all 0.4s ease;
        }

        .top-nav:hover {
            border-color: rgba(208, 59, 91, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(208, 59, 91, 0.1);
        }

        .nav-brand {
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .nav-brand i {
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(208, 59, 91, 0.4));
        }

        .btn-sec {
            background: rgba(208, 59, 91, 0.15);
            border: 1px solid rgba(208, 59, 91, 0.5);
            color: #ffe4e8;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.5px;
        }

        .btn-sec:hover {
            background: rgba(208, 59, 91, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(208, 59, 91, 0.3);
        }

        .glass-card {
            background: var(--card-bg);
            color: var(--text-white);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            border-top: 4px solid var(--accent);
            margin-top: 2rem;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .desc {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .section-card {
            background: rgba(30, 0, 10, 0.4);
            border: 1px solid rgba(255, 182, 193, 0.15);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            color: var(--accent);
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(208, 59, 91, 0.3);
            padding-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.95rem;
            color: var(--text-white);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .input-group label .icon-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            color: var(--accent);
            font-size: 0.9rem;
        }

        .val-badge {
            background: rgba(208, 59, 91, 0.2);
            color: #ffb3c6;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: monospace;
            border: 1px solid rgba(208, 59, 91, 0.4);
        }

        .input-group input[type="text"],
        .input-group input[type="number"] {
            width: 100%;
            background: rgba(255, 182, 193, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
            font-family: monospace;
        }

        .input-group input[type="text"]:focus,
        .input-group input[type="number"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(208, 59, 91, 0.2);
            background: rgba(255, 182, 193, 0.25);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Radio Box Selections */
        .radio-selection {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .radio-selection input[type="radio"] {
            display: none;
        }

        .radio-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 1rem;
            background: rgba(255, 182, 193, 0.1);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-muted);
            font-weight: 500;
            text-align: center;
        }

        /* Gender Specific Colors */
        .radio-selection input[type="radio"]:checked+.radio-box.male {
            background: rgba(59, 130, 246, 0.3);
            border-color: #60a5fa;
            color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .radio-selection input[type="radio"]:checked+.radio-box.female {
            background: rgba(244, 114, 182, 0.3);
            border-color: #f472b6;
            color: #fff;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.4);
        }

        /* General Radio Active Color */
        .radio-selection input[type="radio"]:checked+.radio-box.general {
            background: rgba(208, 59, 91, 0.35);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 15px rgba(208, 59, 91, 0.3);
        }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 182, 193, 0.2);
            border-radius: 5px;
            outline: none;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(208, 59, 91, 0.5);
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .bmi-result-box {
            background: rgba(208, 59, 91, 0.1);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffb3c6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            height: 100%;
        }

        .btn-liver {
            background: linear-gradient(135deg, var(--accent), #ffb3c6);
            color: #4a0c1a;
            box-shadow: 0 10px 25px rgba(208, 59, 91, 0.3);
            width: 100%;
            border-radius: 14px;
            padding: 1.2rem;
            font-size: 1.15rem;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .btn-liver:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(208, 59, 91, 0.5);
            background: linear-gradient(135deg, #ffb3c6, var(--accent));
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(60, 15, 25, 0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(208, 59, 91, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 2rem;
        }

        .loader-text {
            color: #fff;
            font-size: 1.8rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media(max-width: 600px) {

            .input-grid,
            .radio-selection {
                flex-direction: column;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-nodes"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="top-nav">
        <div class="nav-brand"><i class="fas fa-heartbeat"></i> <span>LiverGuard AI</span></div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div
                style="font-size: 0.95rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.3); padding: 0.6rem 1.2rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05);">
                <i class="fas fa-shield-alt" style="color: #ff758f; font-size: 1.1rem;"></i> <span>Clinical
                    Security</span>
            </div>
            <a href="/" class="btn-sec"><i class="fas fa-arrow-left"></i> Return to HUB</a>
        </div>
    </nav>

    <main class="container">
        <form action="/predict" method="post" id="mainForm"
            onsubmit="document.getElementById('analysisLoader').style.display='flex'">
            <input type="hidden" name="mode" value="lifestyle">

            <div class="glass-card">
                <h2><span style="font-weight: 300;">Basic</span> Analysis</h2>
                <p class="desc">Input patient lifestyle and general health metrics section by section to compute
                    metabolic risks.</p>

                <!-- 1. Personal Details Section -->
                <div class="section-card">
                    <h3 class="section-title"><i class="fas fa-user-circle"></i> Personal Details</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-user"></i> Full Name</span></label>
                            <input type="text" name="patient_name" placeholder="e.g. John Doe">
                        </div>
                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-calendar-alt"></i> Age</span></label>
                            <input type="number" name="age" placeholder="Years" required min="1" max="120">
                        </div>
                        <div class="input-group" style="grid-column: span 2;">
                            <label><span class="icon-text"><i class="fas fa-venus-mars"></i> Gender</span></label>
                            <div class="radio-selection">
                                <input type="radio" id="gender_male" name="gender" value="1" required>
                                <label for="gender_male" class="radio-box male"><i class="fas fa-mars"></i> Male</label>

                                <input type="radio" id="gender_female" name="gender" value="0" required>
                                <label for="gender_female" class="radio-box female"><i class="fas fa-venus"></i>
                                    Female</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. BMI Calculator Section -->
                <div class="section-card">
                    <h3 class="section-title"><i class="fas fa-weight"></i> BMI Calculator</h3>
                    <div class="input-grid" style="grid-template-columns: 1fr 1fr 1fr; align-items: end;">
                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-ruler-vertical"></i> Height
                                    (cm)</span></label>
                            <input type="number" id="heightInput" placeholder="e.g. 175" oninput="calculateBMI()">
                        </div>
                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-weight-hanging"></i> Weight
                                    (kg)</span></label>
                            <input type="number" step="0.1" id="weightInput" placeholder="e.g. 70.5"
                                oninput="calculateBMI()">
                        </div>
                        <div class="input-group" style="height: 100%;">
                            <label><span class="icon-text"><i class="fas fa-calculator"></i> Computed BMI</span></label>
                            <div class="bmi-result-box">
                                <span id="bmiDisplay">--</span>
                            </div>
                            <!-- Hidden actual input to send to server -->
                            <input type="hidden" name="bmi" id="bmiHidden" value="22.0" required>
                        </div>
                    </div>
                </div>

                <!-- 3. Lifestyle & Habits Section (Sliders) -->
                <div class="section-card">
                    <h3 class="section-title"><i class="fas fa-running"></i> Lifestyle & Habits</h3>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-wine-glass"></i> Alcohol (Units/Wk)</span>
                                <span class="val-badge" id="alc_val">0</span>
                            </label>
                            <input type="range" name="alcohol" min="0" max="40" step="1" value="0"
                                oninput="document.getElementById('alc_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-walking"></i> Activity (Hrs/Wk)</span>
                                <span class="val-badge" id="act_val">0</span>
                            </label>
                            <input type="range" name="activity" min="0" max="25" step="0.5" value="0"
                                oninput="document.getElementById('act_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-hamburger"></i> UPF Intake (0-15)</span>
                                <span class="val-badge" id="upf_val">0</span>
                            </label>
                            <input type="range" name="upf" min="0" max="15" step="0.5" value="0"
                                oninput="document.getElementById('upf_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-tint"></i> Hydration (Liters/Day)</span>
                                <span class="val-badge" id="hyd_val">2.0</span>
                            </label>
                            <input type="range" name="hydration" min="0.5" max="8" step="0.1" value="2.0"
                                oninput="document.getElementById('hyd_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-cookie"></i> Sugar Addict (1-10)</span>
                                <span class="val-badge" id="sug_val">5</span>
                            </label>
                            <input type="range" name="sugar" min="1" max="10" step="1" value="5"
                                oninput="document.getElementById('sug_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-bed"></i> Sleep Quality (1-10)</span>
                                <span class="val-badge" id="slp_val">5</span>
                            </label>
                            <input type="range" name="sleep" min="1" max="10" step="0.5" value="5"
                                oninput="document.getElementById('slp_val').innerText = this.value">
                        </div>
                        <div class="input-group">
                            <label>
                                <span class="icon-text"><i class="fas fa-brain"></i> Stress Index (1-10)</span>
                                <span class="val-badge" id="str_val">5</span>
                            </label>
                            <input type="range" name="stress" min="1" max="10" step="0.5" value="5"
                                oninput="document.getElementById('str_val').innerText = this.value">
                        </div>
                    </div>
                </div>

                <!-- 4. Medical & Clinical Section -->
                <div class="section-card">
                    <h3 class="section-title"><i class="fas fa-notes-medical"></i> Medical & Clinical Context</h3>

                    <div class="input-group" style="margin-bottom: 1.5rem;">
                        <label><span class="icon-text"><i class="fas fa-smoking"></i> Smoking Status</span></label>
                        <div class="radio-selection">
                            <input type="radio" id="smoke_no" name="smoking" value="0" required>
                            <label for="smoke_no" class="radio-box general">Non-Smoker</label>

                            <input type="radio" id="smoke_yes" name="smoking" value="1" required>
                            <label for="smoke_yes" class="radio-box general">Active Smoker</label>
                        </div>
                    </div>

                    <div class="input-group" style="margin-bottom: 1.5rem;">
                        <label><span class="icon-text"><i class="fas fa-dna"></i> Genetic Risk (0-2)</span></label>
                        <div class="radio-selection">
                            <input type="radio" id="gen_low" name="genetic" value="0" required>
                            <label for="gen_low" class="radio-box general">Low</label>

                            <input type="radio" id="gen_med" name="genetic" value="1" required>
                            <label for="gen_med" class="radio-box general">Medium</label>

                            <input type="radio" id="gen_high" name="genetic" value="2" required>
                            <label for="gen_high" class="radio-box general">High</label>
                        </div>
                    </div>

                    <div class="input-grid">
                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-syringe"></i> Diabetes</span></label>
                            <div class="radio-selection">
                                <input type="radio" id="diab_no" name="diabetes" value="0" required>
                                <label for="diab_no" class="radio-box general">No</label>

                                <input type="radio" id="diab_yes" name="diabetes" value="1" required>
                                <label for="diab_yes" class="radio-box general">Yes</label>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-stethoscope"></i>
                                    Hypertension</span></label>
                            <div class="radio-selection">
                                <input type="radio" id="hyp_no" name="hypertension" value="0" required>
                                <label for="hyp_no" class="radio-box general">No</label>

                                <input type="radio" id="hyp_yes" name="hypertension" value="1" required>
                                <label for="hyp_yes" class="radio-box general">Yes</label>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-industry"></i> Env. Exposure</span></label>
                            <div class="radio-selection">
                                <input type="radio" id="env_low" name="exposure" value="0" required>
                                <label for="env_low" class="radio-box general">Low</label>

                                <input type="radio" id="env_high" name="exposure" value="1" required>
                                <label for="env_high" class="radio-box general">High</label>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><span class="icon-text"><i class="fas fa-pills"></i> Baseline LFT</span></label>
                            <input type="number" step="0.1" name="lft" placeholder="e.g. 60" value="60" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-liver mt-4">
                    <i class="fas fa-play-circle" style="margin-right: 8px;"></i> RUN Basic Analysis
                </button>
            </div>
        </form>

        <div id="analysisLoader" class="loader-overlay" style="display: none;">
            <div class="text-center" style="display: flex; flex-direction: column; align-items: center;">
                <div class="spinner"></div>
                <h2 class="loader-text" style="color: #fff;">PROCESSING Analysis...</h2>
                <p style="color: var(--accent); margin-top: 0.5rem; letter-spacing: 2px; text-transform: uppercase;">
                    Correlating patient vectors</p>
            </div>
        </div>
    </main>

    <script>
        function calculateBMI() {
            let h = parseFloat(document.getElementById('heightInput').value);
            let w = parseFloat(document.getElementById('weightInput').value);

            if (h > 0 && w > 0) {
                let h_m = h / 100;
                let bmi = w / (h_m * h_m);
                let finalBMI = bmi.toFixed(2);

                document.getElementById('bmiDisplay').innerText = finalBMI;
                document.getElementById('bmiHidden').value = finalBMI;
            } else {
                document.getElementById('bmiDisplay').innerText = "--";
                document.getElementById('bmiHidden').value = "22.0"; // default fallback
            }
        }
    </script>
</body>

</html>
